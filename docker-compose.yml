version: "3.9"

# Routing Benchmark Tool — Engine Stack
# Usage:
#   docker compose up -d          # start both engines
#   docker compose down           # stop both engines
#   docker compose logs -f        # follow logs
#
# Ports:
#   Valhalla    → http://localhost:8002
#   GraphHopper → http://localhost:8989

services:

  valhalla:
    image: ghcr.io/nilsnolde/docker-valhalla/valhalla:latest
    container_name: valhalla
    ports:
      - "8002:8002"
    volumes:
      - ./valhalla_data:/custom_files
    environment:
      - use_tiles_ignore_pbf=True
      - force_rebuild=False
    restart: unless-stopped

  graphhopper:
    image: israelhikingmap/graphhopper:latest
    container_name: graphhopper
    ports:
      - "8989:8080"
    volumes:
      - ./graphhopper_data:/data
    environment:
      - JAVA_OPTS=-Xmx4g -Xms1g
    command: >
      -i /data/vietnam-latest.osm.pbf
      -c /data/config.yml
      -o /data/graph-cache
    restart: unless-stopped
